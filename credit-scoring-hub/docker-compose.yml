services:
  postgres:
    image: postgres:16-alpine
    container_name: credit-scoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: credit_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ml-service:
    build:
      context: ./ml-service
    container_name: credit-scoring-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/data:/app/data

  backend:
    build:
      context: ./backend
    container_name: credit-scoring-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - ml-service
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/credit_scoring?schema=public
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: credit-scoring-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  telegram-bot:
    build:
      context: ./telegram-bot
    container_name: credit-scoring-bot
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-replace-me}
      BACKEND_URL: http://backend:8080

volumes:
  postgres_data:
