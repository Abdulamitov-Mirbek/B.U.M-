<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Scoring Demo</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="container">
        <div class="lang-switch">
            <label for="lang-select" data-i18n="lang_label">Язык:</label>
            <select id="lang-select">
                <option value="ru">Русский</option>
                <option value="kg">Кыргызча</option>
            </select>
        </div>

        <h1 data-i18n="heading_main">Кредитный скоринг</h1>
        <p data-i18n="description">Минимальная демонстрация для тестовой сборки контейнера.</p>

        <section class="card">
            <h2 data-i18n="sample_heading">Пример данных</h2>
            <button id="load-data" data-i18n="load_data">Загрузить данные</button>
            <pre id="data-output" class="output"></pre>
        </section>

        <section class="card">
            <h2 data-i18n="scoring_heading">Расчёт скоринга</h2>
            <label>
                <span data-i18n="income_label">Доход, ₽</span>
                <input id="income" type="number" min="0" value="100000" />
            </label>
            <label>
                <span data-i18n="loan_label">Сумма кредита, ₽</span>
                <input id="loan" type="number" min="0" value="500000" />
            </label>
            <label>
                <span data-i18n="history_label">Кредитная история (0–1)</span>
                <input id="history" type="range" min="0" max="1" step="0.01" value="0.8" />
                <span id="history-value">0.80</span>
            </label>
            <button id="score-btn" data-i18n="score_btn">Посчитать</button>
            <div id="score-result" class="result"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
